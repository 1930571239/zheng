<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>信息管理系统 - 首页</title>
    <style>
        *{margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑";}
        body{background-color: #f5f7fa;}
        .top-nav{
            width: 100%; height: 60px; background: #2d3748; line-height: 60px; padding: 0 30px;

        }
        .left-menu li a:hover{background: #4299e1; color: #fff;}
        .main-content{
            flex: 1; margin-left: 20px; background: #fff; border-radius: 5px; box-shadow: 0 0 8px #ddd; padding: 30px;
        }
        .main-content h2{
            color: #2d3748; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee;
        }
        .content-item{line-height: 2.2; font-size: 16px; color: #555;}
        .content-item a{color: #4299e1; text-decoration: none;}
